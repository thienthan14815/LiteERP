# ⚠️ LEGACY — the shipped app runs standalone on-device (SQLite, no external
# services). This compose file describes the ORIGINAL server stack
# (Postgres/Redis/MinIO/Nginx) and is kept for reference / running the legacy
# topology only. It is NOT required to build or run LiteERP. See README.md.
version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: refurb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - refurb-net

  redis:
    image: redis:7
    container_name: refurb-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - refurb-net

  minio:
    image: minio/minio:latest
    container_name: refurb-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - refurb-net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: refurb-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - refurb-net

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: refurb-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - refurb-net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: refurb-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - refurb-net

  nginx:
    image: nginx:latest
    container_name: refurb-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - refurb-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  refurb-net:
    driver: bridge
